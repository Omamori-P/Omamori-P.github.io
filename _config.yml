# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Omamori-P's Blob
# 副标题的展示形式为拼接在标题后面 title-subtitle
subtitle: ''
# 个人简介描述
description: ''
# 主要作用是为搜索引擎提供网站的核心主题关键词列表，不过实际效果不佳，主要还是靠检索title
keywords: 个人博客
author: Omamori-P
language: zh-CN
# 默认使用电脑上的时区配置
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://omamori-p.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: ''

# hexo-oh-my-live2d 看板娘配置
# https://github.com/feiyuhao/hexo-oh-my-live2d
OhMyLive2d:
  enable: true
  CDN: https://unpkg.com/oh-my-live2d
  option:
    dockedPosition: 'left'
    mobileDisplay: false
    models:
      - path: /assets/live2d/hiyori/hiyori_pro_t11.model3.json
        scale: 0.1
        position: [-10, 35]
        stageStyle:
          width: 350
          height: 450
#        mobileScale: 0.1
#        mobilePosition: [-10, 23]
#        mobileStageStyle:
#          width: 180
#          height: 200
    parentElement: document.body
    primaryColor: 'var(--btn-bg)'
    sayHello: false
    tips:
      style:
        width: 230
        height: 120
        left: calc(50% - 20px)
        top: -100px
      mobileStyle:
        width: 180
        height: 80
        left: calc(50% - 30px)
        top: -100px
      idleTips:
        interval: 120000
        message: |
          function(){
            const msgs = ['你好呀~', '欢迎来到我的小站~'];
            const i = Number(localStorage.getItem('hiyori_msg') || 0) % msgs.length;
            localStorage.setItem('hiyori_msg', i + 1);
            return msgs[i];
          }
  then: |
    if(window.__oml2d)window.__oml2d.destroy();
    window.__oml2d=oml2d;
    if(!window.__live2dInit){
      window.__live2dInit=true;
      document.addEventListener('pjax:send',function(){
        if(window.__oml2d){window.__oml2d.destroy();window.__oml2d=null}
      });
    }
